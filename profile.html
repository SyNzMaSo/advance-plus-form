<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>โปรไฟล์ — Advance Plus</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{
      --bg:linear-gradient(150deg,#f0fdf4 0%,#dcfce7 25%,#bbf7d0 50%,#d1fae5 75%,#ecfdf5 100%);
      --card:#fff;--txt:#14532d;--txt-md:#166534;--txt-dim:#4ade80;
      --border:#86efac;--inp-bg:#f0fdf4;--g-md:#16a34a;--g-dk:#15803d;
      --sec-div:#dcfce7;--shadow:0 4px 24px rgba(22,101,52,.10);
      --red:#dc2626;--red-pale:#fef2f2;
    }
    [data-theme="dark"]{
      --bg:linear-gradient(150deg,#1a3a28 0%,#1f4530 20%,#264d38 45%,#1f4530 70%,#1a3a28 100%);
      --card:#234535;--txt:#ecfdf5;--txt-md:#bbf7d0;--txt-dim:#6ee7b7;
      --border:rgba(110,231,183,.35);--inp-bg:#1f4530;--g-md:#34d399;--g-dk:#4ade80;
      --sec-div:rgba(110,231,183,.18);--shadow:0 4px 28px rgba(0,0,0,.3);
      --red:#fca5a5;--red-pale:#3b1a1a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Kanit',sans-serif;background:var(--bg);background-attachment:fixed;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 3rem;color:var(--txt);transition:background .4s,color .3s;}

    /* TOPBAR */
    .topbar{
      width:100%;background:rgba(0,0,0,.55);backdrop-filter:blur(12px);
      padding:.7rem 1.5rem;display:flex;align-items:center;gap:.8rem;
      position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.08);
    }
    .topbar img{height:36px;width:auto;object-fit:contain;}
    .topbar-title{font-size:.95rem;font-weight:700;color:#fff;flex:1;}
    .nav-link{
      font-size:.78rem;font-weight:600;color:rgba(255,255,255,.75);
      text-decoration:none;padding:.35rem .75rem;border-radius:8px;
      border:1px solid rgba(255,255,255,.2);transition:all .2s;
    }
    .nav-link:hover{background:rgba(255,255,255,.12);color:#fff;}
    .btn-logout{
      font-size:.78rem;font-weight:600;color:#fca5a5;
      background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);
      padding:.35rem .75rem;border-radius:8px;cursor:pointer;
      font-family:'Kanit',sans-serif;transition:all .2s;
    }
    .btn-logout:hover{background:rgba(220,38,38,.3);color:#fff;}

    .page-wrap{width:100%;max-width:520px;padding:1.8rem 1rem 0;}

    /* AVATAR CARD */
    .avatar-card{
      background:var(--card);border-radius:18px;box-shadow:var(--shadow);
      border:1px solid var(--sec-div);padding:1.8rem;
      display:flex;align-items:center;gap:1.2rem;margin-bottom:1.2rem;
      transition:background .4s;
    }
    .avatar{
      width:64px;height:64px;border-radius:50%;
      background:linear-gradient(135deg,#14532d,#22c55e);
      display:grid;place-items:center;
      font-size:1.6rem;font-weight:700;color:#fff;flex-shrink:0;
      box-shadow:0 4px 16px rgba(22,101,52,.3);
    }
    .avatar-info h2{font-size:1.1rem;font-weight:700;color:var(--txt);}
    .avatar-info p{font-size:.78rem;color:var(--txt-dim);margin-top:.2rem;}
    .badge{display:inline-block;font-size:.65rem;font-weight:700;letter-spacing:.06em;padding:2px 9px;border-radius:20px;background:rgba(34,197,94,.15);color:#16a34a;border:1px solid rgba(34,197,94,.3);margin-top:.3rem;}
    [data-theme="dark"] .badge{background:rgba(74,222,128,.15);color:#4ade80;}

    /* SECTION CARD */
    .sec-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);border:1px solid var(--sec-div);overflow:hidden;margin-bottom:1.2rem;transition:background .4s;}
    .sec-head{padding:1rem 1.4rem .75rem;border-bottom:1px solid var(--sec-div);}
    .sec-head h3{font-size:.78rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--g-md);}
    .sec-body{padding:1.2rem 1.4rem 1.4rem;}

    .fg{margin-bottom:.9rem;}
    .fg:last-child{margin-bottom:0;}
    label{display:block;font-size:.77rem;font-weight:500;color:var(--txt-md);margin-bottom:.32rem;}
    input{
      width:100%;height:42px;padding:.62rem .9rem;
      background:var(--inp-bg);border:1.5px solid var(--border);border-radius:10px;
      color:var(--txt);font-family:'Kanit',sans-serif;font-size:.9rem;
      outline:none;transition:border .2s,box-shadow .2s,background .25s;
      appearance:none;
    }
    input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.14);background:rgba(239,246,255,.5);}
    [data-theme="dark"] input:focus{background:rgba(37,99,235,.18);color:#dbeafe;}
    input:disabled{opacity:.55;cursor:not-allowed;}

    .btn-save{
      width:100%;height:44px;margin-top:.3rem;
      background:linear-gradient(135deg,#14532d,#15803d 55%,#22c55e);
      border:none;border-radius:11px;color:#fff;
      font-family:'Kanit',sans-serif;font-size:.95rem;font-weight:700;
      letter-spacing:.06em;cursor:pointer;transition:transform .2s,box-shadow .2s;
    }
    .btn-save:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(22,101,52,.28);}
    .btn-save:active{transform:translateY(0);}
    .btn-save:disabled{opacity:.5;cursor:not-allowed;transform:none;}

    .toast-ok{display:none;margin-top:.7rem;padding:.6rem .9rem;background:#f0fdf4;border:1px solid #86efac;border-radius:9px;font-size:.78rem;color:#15803d;text-align:center;}
    .toast-ok.show{display:block;animation:popIn .3s ease;}
    .toast-err{display:none;margin-top:.7rem;padding:.6rem .9rem;background:var(--red-pale);border:1px solid #fca5a5;border-radius:9px;font-size:.78rem;color:var(--red);text-align:center;}
    .toast-err.show{display:block;}
    @keyframes popIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}

    .hint{font-size:.7rem;color:var(--txt-dim);margin-top:.25rem;}
    .divider{height:1px;background:var(--sec-div);margin:.8rem 0;}

    .theme-btn{
      position:fixed;bottom:1.6rem;right:1.6rem;z-index:999;
      width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
      display:grid;place-items:center;font-size:1.2rem;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,background .4s;
    }
    [data-theme="light"] .theme-btn{background:linear-gradient(135deg,#1e3a5f,#1e40af,#312e81);color:#fde68a;box-shadow:0 4px 18px rgba(30,58,138,.38);}
    [data-theme="dark"]  .theme-btn{background:linear-gradient(135deg,#fef08a,#fbbf24,#f59e0b);color:#1c1917;box-shadow:0 4px 18px rgba(251,191,36,.38);}
    .theme-btn:hover{transform:scale(1.12) rotate(14deg);}
    .spinner{display:inline-block;width:13px;height:13px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:"AIzaSyDgyBh_OWjnIpok3gR9LUsT0CAqGK6FVao",
    authDomain:"advance-plus-form.firebaseapp.com",
    projectId:"advance-plus-form",
    storageBucket:"advance-plus-form.firebasestorage.app",
    messagingSenderId:"130477031774",
    appId:"1:130477031774:web:09345e091812be63d04fcf"
  });
  const auth = firebase.auth();

  // ── AUTH GUARD ──
  auth.onAuthStateChanged(user => {
    if (!user) { window.location.href = 'login.html'; return; }
    const name  = user.displayName || '';
    const email = user.email || '';
    document.getElementById('displayNameShow').textContent = name || '(ยังไม่ได้ตั้งชื่อ)';
    document.getElementById('emailShow').textContent       = email;
    document.getElementById('emailField').value            = email;
    document.getElementById('newName').value               = name;
    document.getElementById('avatarLetter').textContent    = (name || email).charAt(0).toUpperCase();
  });

  // ── SAVE NAME ──
  async function saveName() {
    const name = document.getElementById('newName').value.trim();
    const btn  = document.getElementById('btnSaveName');
    hideToasts('Name');
    if (!name) { showErr('toastNameErr','กรุณากรอกชื่อ'); return; }
    btn.innerHTML = '<span class="spinner"></span>กำลังบันทึก...'; btn.disabled = true;
    try {
      await auth.currentUser.updateProfile({ displayName: name });
      document.getElementById('displayNameShow').textContent = name;
      document.getElementById('avatarLetter').textContent = name.charAt(0).toUpperCase();
      showOk('toastName');
    } catch(e) { showErr('toastNameErr', e.message); }
    btn.innerHTML = '💾 บันทึกชื่อ'; btn.disabled = false;
  }

  // ── CHANGE PASSWORD ──
  async function changePassword() {
    const cur  = document.getElementById('curPass').value;
    const np   = document.getElementById('newPass').value;
    const conf = document.getElementById('confPass').value;
    const btn  = document.getElementById('btnSavePass');
    hideToasts('Pass');

    if (!cur)        { showErr('toastPassErr','กรุณากรอกรหัสผ่านปัจจุบัน'); return; }
    if (np.length<6) { showErr('toastPassErr','รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร'); return; }
    if (np !== conf) { showErr('toastPassErr','รหัสผ่านใหม่ไม่ตรงกัน'); return; }

    btn.innerHTML = '<span class="spinner"></span>กำลังเปลี่ยน...'; btn.disabled = true;
    try {
      const user       = auth.currentUser;
      const credential = firebase.auth.EmailAuthProvider.credential(user.email, cur);
      await user.reauthenticateWithCredential(credential);
      await user.updatePassword(np);
      document.getElementById('curPass').value  = '';
      document.getElementById('newPass').value  = '';
      document.getElementById('confPass').value = '';
      showOk('toastPass');
    } catch(e) {
      const msgs = {
        'auth/wrong-password':         'รหัสผ่านปัจจุบันไม่ถูกต้อง',
        'auth/invalid-credential':     'รหัสผ่านปัจจุบันไม่ถูกต้อง',
        'auth/too-many-requests':      'ลองผิดหลายครั้ง กรุณารอสักครู่',
        'auth/weak-password':          'รหัสผ่านใหม่ไม่ปลอดภัยพอ',
        'auth/requires-recent-login':  'กรุณา logout แล้วล็อกอินใหม่ก่อนเปลี่ยนรหัสผ่าน',
      };
      showErr('toastPassErr', msgs[e.code] || e.message);
    }
    btn.innerHTML = '🔐 เปลี่ยนรหัสผ่าน'; btn.disabled = false;
  }

  // ── LOGOUT ──
  async function doLogout() {
    await auth.signOut();
    window.location.href = 'login.html';
  }

  function showOk(id)  { document.getElementById(id).classList.add('show'); setTimeout(()=>document.getElementById(id).classList.remove('show'),3000); }
  function showErr(id,msg) { const el=document.getElementById(id); el.textContent='⚠️ '+msg; el.classList.add('show'); }
  function hideToasts(s) { ['toast'+s,'toast'+s+'Err'].forEach(id=>document.getElementById(id).classList.remove('show')); }

  // ── THEME ──
  const themeBtn=document.getElementById('themeBtn');
  function setTheme(t){document.documentElement.setAttribute('data-theme',t);themeBtn.textContent=t==='dark'?'☀️':'🌙';localStorage.setItem('adv-theme',t);}
  function toggleTheme(){setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');}
  (function(){setTheme(localStorage.getItem('adv-theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));}());
</script>
</body>
</html>
